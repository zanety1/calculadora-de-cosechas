<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cosecha PRO V44 - Anti-Error</title>
    <style>
        :root { --primary: #1a73e8; --dark: #202124; --danger: #ea4335; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 20px; display: flex; justify-content: center; }
        .box { width: 100%; max-width: 900px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .panel { padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e0e0e0; background: #f0f7ff; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; background: #673ab7; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin: 5px; }
        .res-box { background: var(--dark); color: white; padding: 15px; border-radius: 12px; margin-top: 10px; font-family: monospace; position: relative; }
        #loading { display: none; color: #673ab7; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="box">
    <h2>📦 Cosecha PRO V44</h2>
    
    <div class="panel">
        <strong>🔑 API KEY:</strong> 
        <input type="password" id="api-key" placeholder="Pega tu clave..." oninput="localStorage.setItem('h_key_v44', this.value)">
    </div>

    <div class="panel" style="background:#fff3e0">
        <strong>👥 Personas:</strong> <input type="number" id="n-soc" value="3" style="width:50px" oninput="repartir()">
    </div>

    <div style="display:flex; gap:10px; align-items:center; margin-bottom:20px;">
        <label class="btn">
            📷 SUBIR CAPTURA
            <input type="file" accept="image/*" style="display:none" onchange="subirFoto(this)">
        </label>
        <span id="loading">⌛ LEYENDO IMAGEN...</span>
    </div>

    <table style="width:100%; border-collapse: collapse;">
        <thead><tr style="text-align:left; border-bottom:2px solid #eee"><th>Producto</th><th>Cantidad</th><th>$</th></tr></thead>
        <tbody id="cuerpo"></tbody>
    </table>

    <div id="resultados"></div>
</div>

<script>
    const BASE = ["Remolacha azucarera", "Café", "Piña", "Trigo", "Patata"];
    
    window.onload = () => {
        const k = localStorage.getItem('h_key_v44');
        if(k) document.getElementById('api-key').value = k;
        BASE.forEach(p => nuevaFila(p, 0));
    };

    function nuevaFila(n, q) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" class="in-n" value="${n}" oninput="repartir()"></td>
            <td><input type="number" class="in-q" value="${q}" oninput="repartir()"></td>
            <td class="vd" style="font-weight:bold">${q*3}$</td>
        `;
        document.getElementById('cuerpo').appendChild(tr);
        repartir();
    }

    async function subirFoto(input) {
        const file = input.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            const b64 = e.target.result.split(',')[1];
            await llamarIA(b64);
        };
        reader.readAsDataURL(file);
    }

    async function llamarIA(b64) {
        const key = document.getElementById('api-key').value.trim();
        if(!key) return alert("Pega la API Key");
        document.getElementById('loading').style.display = "inline";

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [
                    { text: "Extrae solo PRODUCTO:CANTIDAD. Ejemplo: Cafe:1354. Ignora KG. Nombres: Cafe, Pina, Remolacha azucarera." },
                    { inline_data: { mime_type: "image/png", data: b64 } }
                ] }] })
            });

            const json = await res.json();
            
            // --- FIX PARA EL ERROR DE TU CAPTURA ---
            if (!json.candidates || !json.candidates[0]) {
                throw new Error("La IA no devolvió datos. Revisa tu API Key o la imagen.");
            }

            const texto = json.candidates[0].content.parts[0].text;
            procesarIA(texto);
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            document.getElementById('loading').style.display = "none";
        }
    }

    function procesarIA(t) {
        t.split('\n').forEach(l => {
            if(!l.includes(':')) return;
            let [nIA, qRaw] = l.split(':');
            let qIA = parseInt(qRaw.replace(/\D/g, '')) || 0;
            let hallado = false;
            
            document.querySelectorAll('#cuerpo tr').forEach(tr => {
                let nF = tr.querySelector('.in-n').value.toLowerCase();
                if(nF.includes(nIA.toLowerCase().trim()) || nIA.toLowerCase().includes(nF)) {
                    let inp = tr.querySelector('.in-q');
                    inp.value = (parseInt(inp.value) || 0) + qIA;
                    hallado = true;
                }
            });
            if(!hallado && qIA > 0) nuevaFila(nIA.trim(), qIA);
        });
        repartir();
    }

    function repartir() {
        const n = parseInt(document.getElementById('n-soc').value) || 1;
        let items = [], total = 0;
        document.querySelectorAll('#cuerpo tr').forEach(tr => {
            const q = parseInt(tr.querySelector('.in-q').value) || 0;
            const nom = tr.querySelector('.in-n').value;
            tr.querySelector('.vd').innerText = (q*3) + "$";
            if(q > 0) { items.push({nom, q}); total += q*3; }
        });

        const cuota = total / n;
        let ra = Array.from({length: n}, () => ({l:[], t:0}));
        let sIdx = 0;

        items.forEach(it => {
            let rem = it.q;
            while(rem > 0 && sIdx < n) {
                let falta = (cuota - ra[sIdx].t) / 3;
                let dar = (sIdx === n-1) ? rem : Math.min(rem, Math.floor(falta));
                if(dar > 0) {
                    ra[sIdx].l.push(`${dar} ${it.nom}`);
                    ra[sIdx].t += dar*3;
                    rem -= dar;
                }
                if(rem > 0 && sIdx < n-1) sIdx++; else break;
            }
        });

        let h = `<h3 style="margin-top:20px">⚖️ Reparto Sugerido (${total}$)</h3>`;
        ra.forEach((s, i) => {
            let ag = {};
            s.l.forEach(x => { let [c, ...nm] = x.split(' '); let name = nm.join(' '); ag[name] = (ag[name] || 0) + parseInt(c); });
            let res = []; for(let p in ag) res.push(`${ag[p]} ${p}`);
            h += `<div class="res-box">Socio ${i+1}: <b>${s.t}$</b> - Compra ${res.join(' + ') || 'Nada'}</div>`;
        });
        document.getElementById('resultados').innerHTML = h;
    }
</script>
</body>
</html>
