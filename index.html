<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosecha PRO - Versión Final 2026</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #673ab7; --success: #34a853; --danger: #ea4335; --dark: #202124; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 20px; background: #f8f9fa; display: flex; justify-content: center; }
        .box { width: 100%; max-width: 900px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .panel { padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e0e0e0; }
        .config-panel { background: #fffdf0; border-left: 5px solid #fbc02d; }
        .btn { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; color: white; transition: 0.2s; }
        .btn-ia { background: var(--secondary); }
        .btn-add { background: var(--success); }
        .btn-clear { background: var(--danger); }
        #gallery { display: flex; gap: 10px; flex-wrap: wrap; margin: 15px 0; min-height: 50px; }
        .thumb-item { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; border: 2px solid #ddd; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 6px; width: 90%; }
        .res-box { background: var(--dark); color: #eee; padding: 15px; border-radius: 10px; margin-top: 10px; font-family: monospace; position: relative; }
        #sys-msg { display: none; padding: 10px; border-radius: 5px; font-weight: bold; margin-bottom: 15px; }
        .msg-loading { background: #e8f0fe; color: var(--primary); display: block !important; }
        .msg-error { background: #fce8e6; color: var(--danger); display: block !important; }
    </style>
</head>
<body>

<div class="box">
    <h2>📦 Cosecha PRO - Versión Final</h2>

    <div class="config-panel panel">
        <strong>🔑 API KEY:</strong>
        <input type="password" id="api-key" style="width:70%;" oninput="localStorage.setItem('gemini_final_key', this.value)" placeholder="Pega tu clave de Google AI Studio">
    </div>

    <div style="display:flex; gap:10px; align-items:center;">
        <button class="btn btn-add" onclick="nuevaFila('', 0)">➕ FILA</button>
        <label class="btn btn-ia">
            📷 ANALIZAR FOTO
            <input type="file" id="file-input" accept="image/*" style="display:none" onchange="procesarFoto(this)">
        </label>
        <button class="btn btn-clear" style="margin-left:auto" onclick="limpiar()">🗑️ RESET</button>
    </div>

    <div id="sys-msg"></div>
    <div id="gallery"></div>

    <table>
        <thead><tr><th>Producto</th><th>Cantidad</th><th>Total $</th><th></th></tr></thead>
        <tbody id="cuerpo"></tbody>
    </table>

    <div id="zona-reparto"></div>
</div>

<script>
    let fotos = [];
    const BASE = ["Café", "Remolacha azucarera", "Piña", "Trigo", "Maíz"];

    window.onload = () => {
        const k = localStorage.getItem('gemini_final_key');
        if(k) document.getElementById('api-key').value = k;
        BASE.forEach(p => nuevaFila(p, 0));
    };

    function mostrarMsg(txt, tipo) {
        const el = document.getElementById('sys-msg');
        el.className = `msg-${tipo}`;
        el.innerText = txt;
    }

    function nuevaFila(n, q) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" class="p-nom" value="${n}" oninput="repartir()"></td>
            <td><input type="number" class="p-cant" value="${q}" oninput="repartir()"></td>
            <td class="p-total" style="font-weight:bold">${q*3}$</td>
            <td><button onclick="this.parentElement.parentElement.remove(); repartir();">✕</button></td>
        `;
        document.getElementById('cuerpo').appendChild(tr);
        repartir();
    }

    async function procesarFoto(input) {
        const file = input.files[0];
        if(!file) return;
        
        const reader = new FileReader();
        reader.onload = async (e) => {
            const img = document.createElement('img');
            img.src = e.target.result;
            img.className = 'thumb-item';
            document.getElementById('gallery').appendChild(img);
            
            const b64 = e.target.result.split(',')[1];
            await llamarIA(b64, file.type);
        };
        reader.readAsDataURL(file);
    }

    async function llamarIA(b64, mime) {
        const key = document.getElementById('api-key').value.trim();
        if(!key) return mostrarMsg("⚠️ Pega tu API KEY arriba", "error");

        mostrarMsg("⌛ Analizando imagen...", "loading");

        // LISTA DE RUTAS ACTUALIZADAS (Fallback automático)
        const rutas = [
            `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`,
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${key}`,
            `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-pro:generateContent?key=${key}`
        ];

        let exito = false;
        let errorTxt = "";

        for (let url of rutas) {
            if (exito) break;
            try {
                const res = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [
                            { text: "Lee el inventario. Busca el nombre y la cantidad tras la 'x'. Formato: PRODUCTO:CANTIDAD. Ejemplo: Cafe:1354. Ignora KG." },
                            { inline_data: { mime_type: mime, data: b64 } }
                        ]}]
                    })
                });
                const data = await res.json();
                if (data.candidates) {
                    const texto = data.candidates[0].content.parts[0].text;
                    actualizarTabla(texto);
                    mostrarMsg("✅ Imagen procesada", "loading");
                    setTimeout(() => document.getElementById('sys-msg').style.display='none', 2000);
                    exito = true;
                } else {
                    errorTxt = data.error ? data.error.message : "Error desconocido";
                }
            } catch (e) { errorTxt = "Error de conexión"; }
        }

        if (!exito) mostrarMsg(`❌ Error: ${errorTxt}`, "error");
    }

    function actualizarTabla(texto) {
        texto.split('\n').forEach(linea => {
            if(!linea.includes(':')) return;
            const [nIA, qRaw] = linea.split(':');
            // ELIMINAR COMAS DE MILES (Crucial para x1,354 -> 1354)
            const qClean = parseInt(qRaw.replace(/,/g, '').replace(/\D/g, '')) || 0;

            let h = false;
            document.querySelectorAll('#cuerpo tr').forEach(tr => {
                const nomFila = tr.querySelector('.p-nom').value.toLowerCase();
                const nomIA = nIA.toLowerCase().trim();
                if(nomFila.includes(nomIA) || nomIA.includes(nomFila)) {
                    const inp = tr.querySelector('.p-cant');
                    inp.value = (parseInt(inp.value) || 0) + qClean;
                    h = true;
                }
            });
            if(!h && qClean > 0) nuevaFila(nIA.trim(), qClean);
        });
        repartir();
    }

    function repartir() {
        let total = 0;
        document.querySelectorAll('#cuerpo tr').forEach(tr => {
            const q = parseInt(tr.querySelector('.p-cant').value) || 0;
            tr.querySelector('.p-total').innerText = (q*3) + "$";
            total += (q*3);
        });
        const porPersona = Math.floor(total / 3);
        document.getElementById('zona-reparto').innerHTML = `
            <div class="res-box">
                <strong>REPARTO (3 personas):</strong> Total: ${total}$ | 
                <strong>Cada uno: ${porPersona}$</strong>
            </div>`;
    }

    function limpiar() {
        if(confirm("¿Borrar todo?")) {
            document.getElementById('cuerpo').innerHTML = "";
            document.getElementById('gallery').innerHTML = "";
            BASE.forEach(p => nuevaFila(p, 0));
        }
    }
</script>
</body>
</html>
