<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Cosecha PRO - V34 Fix Galería</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #673ab7; --success: #34a853; --danger: #ea4335; }
        body { font-family: 'Segoe UI', sans-serif; margin: 20px; background: #f0f2f5; color: #333; }
        .box { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .panel { padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #ddd; }
        .config-panel { background: #fff3e0; border-color: #ffe0b2; }
        .setup-panel { background: #e8f0fe; border-left: 5px solid var(--primary); }
        .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; color: white; }
        .btn-ia { background: var(--secondary); }
        .btn-add { background: var(--success); }
        .btn-clear { background: var(--danger); }
        
        /* Galería corregida */
        #gallery { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin: 15px 0; min-height: 90px; padding: 10px; background: #f9f9f9; border-radius: 10px; }
        .thumb-container { position: relative; width: 80px; height: 80px; border-radius: 8px; overflow: hidden; border: 3px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: 0.3s; cursor: pointer; background: #eee; }
        .thumb-container img { width: 100%; height: 100%; object-fit: cover; }
        .thumb-container:hover { transform: scale(1.2); z-index: 100; border-color: var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .thumb-container:hover img { object-fit: contain; background: #222; width: 300px; height: 300px; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 15px; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 6px; }
        .res-box { background: #1e1e1e; color: #eee; padding: 15px; border-radius: 10px; margin-top: 10px; font-family: 'Consolas', monospace; position: relative; }
        .res-box b { color: #fbbc05; }
        #loading { display: none; font-weight: bold; color: var(--secondary); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:var(--primary); margin-top:0;">Calculadora de Cosecha PRO 📦 V34</h2>

    <div class="config-panel panel">
        <strong>🔑 API KEY:</strong>
        <input type="password" id="api-key" style="width: 80%;" oninput="localStorage.setItem('key_harvest_v34', this.value)">
    </div>

    <div class="setup-panel panel">
        <strong>👥 Reparto:</strong> Nº Personas 
        <input type="number" id="n-div" value="3" min="1" style="width:60px;" oninput="actualizarSocios();">
        <div id="area-nombres" style="margin-top:10px; display: flex; flex-wrap: wrap;"></div>
    </div>

    <div style="margin: 25px 0; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
        <button class="btn btn-add" onclick="nuevaFila('', 0)">➕ Añadir Fila</button>
        <label class="btn btn-ia" style="cursor:pointer">
            📷 SUBIR CAPTURA
            <input type="file" id="file-input" accept="image/*" style="display:none">
        </label>
        <span id="loading">⌛ ANALIZANDO IMAGEN...</span>
        <button class="btn btn-clear" style="margin-left:auto" onclick="limpiarTodo()">🗑️ Limpiar Todo</button>
    </div>

    <div id="gallery"></div>

    <table>
        <thead><tr><th>Producto</th><th>Cantidad</th><th>$ (x3)</th><th></th></tr></thead>
        <tbody id="tabla-cuerpo"></tbody>
    </table>

    <div id="res-equitativo"></div>
</div>

<script>
    const productosBase = ["Remolacha azucarera", "Café", "Piña", "Trigo", "Arándanos", "Patata", "Champiñones", "Cebada", "Maíz"];
    let imagenesCargadas = JSON.parse(localStorage.getItem('imgs_v34')) || [];

    window.onload = () => {
        const k = localStorage.getItem('key_harvest_v34');
        if(k) document.getElementById('api-key').value = k;
        actualizarSocios();
        resetDefault();
        renderGaleria();
        document.getElementById('file-input').addEventListener('change', function(e) {
            if(this.files[0]) procesarArchivo(this.files[0]);
        });
    };

    function renderGaleria() {
        const gal = document.getElementById('gallery');
        gal.innerHTML = imagenesCargadas.length ? "" : "<small style='color:#999'>No hay fotos cargadas</small>";
        imagenesCargadas.forEach(src => {
            const div = document.createElement('div');
            div.className = "thumb-container";
            div.innerHTML = `<img src="${src}">`;
            gal.appendChild(div);
        });
    }

    async function procesarArchivo(file) {
        const b64Full = await toBase64(file);
        // Guardar para miniatura
        imagenesCargadas.push(b64Full);
        localStorage.setItem('imgs_v34', JSON.stringify(imagenesCargadas));
        renderGaleria();
        
        // Extraer solo la data pura para la API
        const b64Data = b64Full.split(',')[1];
        iniciarIA(b64Data);
    }

    async function iniciarIA(b64Data) {
        const key = document.getElementById('api-key').value.trim();
        const load = document.getElementById('loading');
        if(!key) return alert("Falta API Key.");
        load.style.display = "inline";

        try {
            const instruccion = "Analiza la imagen. Detecta PRODUCTO y xCANTIDAD (el número después de la x). Ignora KG y semillas. Responde SOLO líneas PRODUCTO:CANTIDAD (ej. Trigo:2924). No des explicaciones.";
            
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST", headers: {"Content-Type":"application/json"},
                body: JSON.stringify({contents:[{parts:[{text: instruccion}, {inline_data:{mime_type:"image/png", data:b64Data}}]}]})
            });
            const json = await res.json();
            if(json.candidates && json.candidates[0].content) {
                const textoIA = json.candidates[0].content.parts[0].text;
                console.log("Respuesta IA:", textoIA);
                procesarLimpiezaSuma(textoIA);
            }
        } catch(e) { 
            console.error(e);
            alert("Error al conectar con la IA."); 
        }
        
        load.style.display = "none";
        document.getElementById('file-input').value = "";
    }

    function procesarLimpiezaSuma(texto) {
        texto.split('\n').forEach(linea => {
            if(!linea.includes(':')) return;
            let [nomIA, cantIA] = linea.split(':');
            const num = parseInt(cantIA.replace(/\D/g, '')) || 0;
            if(num <= 0 || linea.toLowerCase().includes('kg')) return;

            let mejorCoincidencia = null;
            let similitudMaxima = 0;

            document.querySelectorAll('#tabla-cuerpo tr').forEach(tr => {
                const nombreExistente = tr.querySelector('.in-n').value;
                const score = calcularSimilitud(nomIA.toLowerCase().trim(), nombreExistente.toLowerCase().trim());
                if (score > similitudMaxima) { similitudMaxima = score; mejorCoincidencia = tr; }
            });

            if (mejorCoincidencia && similitudMaxima > 0.7) {
                const inQ = mejorCoincidencia.querySelector('.in-q');
                inQ.value = (parseInt(inQ.value) || 0) + num;
            } else {
                nuevaFila(nomIA.trim(), num);
            }
        });
        repartir();
    }

    // Algoritmo de similitud
    function calcularSimilitud(s1, s2) {
        let longer = s1.length < s2.length ? s2 : s1;
        let shorter = s1.length < s2.length ? s1 : s2;
        if (longer.length === 0) return 1.0;
        return (longer.length - editDistance(longer, shorter)) / parseFloat(longer.length);
    }

    function editDistance(s1, s2) {
        let costs = [];
        for (let i = 0; i <= s1.length; i++) {
            let lastValue = i;
            for (let j = 0; j <= s2.length; j++) {
                if (i == 0) costs[j] = j;
                else if (j > 0) {
                    let newValue = costs[j - 1];
                    if (s1.charAt(i - 1) != s2.charAt(j - 1)) newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                    costs[j - 1] = lastValue; lastValue = newValue;
                }
            }
            if (i > 0) costs[s2.length] = lastValue;
        }
        return costs[s2.length];
    }

    function actualizarSocios() {
        const n = parseInt(document.getElementById('n-div').value) || 1;
        const area = document.getElementById('area-nombres');
        const actuales = Array.from(area.querySelectorAll('input')).map(i => i.value);
        area.innerHTML = "";
        for(let i=0; i<n; i++) {
            const input = document.createElement('input');
            input.style.width = "120px"; input.style.margin = "5px";
            input.value = actuales[i] || `Socio ${i+1}`;
            input.oninput = repartir;
            area.appendChild(input);
        }
        repartir();
    }

    function resetDefault() {
        document.getElementById('tabla-cuerpo').innerHTML = "";
        productosBase.forEach(p => nuevaFila(p, 0));
    }

    function nuevaFila(n="", q=0) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" class="in-n" value="${n}" oninput="repartir()" style="width:200px;"></td>
            <td><input type="number" class="in-q" value="${q}" oninput="repartir()" style="width:80px;"></td>
            <td class="vd" style="font-weight:bold; color:var(--primary)">${q*3}$</td>
            <td><button onclick="this.parentElement.parentElement.remove(); repartir();">✕</button></td>
        `;
        document.getElementById('tabla-cuerpo').appendChild(tr);
        repartir();
    }

    function repartir() {
        const n = parseInt(document.getElementById('n-div').value) || 1;
        const noms = Array.from(document.querySelectorAll('#area-nombres input')).map(i => i.value);
        let prods = [];
        document.querySelectorAll('#tabla-cuerpo tr').forEach(tr => {
            const nom = tr.querySelector('.in-n').value;
            const cant = parseInt(tr.querySelector('.in-q').value) || 0;
            tr.querySelector('.vd').innerText = (cant * 3) + "$";
            if(cant > 0) prods.push({nom, cant});
        });

        let equi = Array.from({length: n}, () => ({items:[], t:0}));
        let pGlobal = 0;
        prods.forEach(p => {
            let base = Math.floor(p.cant / n), sobras = p.cant % n;
            for(let i=0; i<n; i++) if(base > 0) { equi[i].items.push(`${base} ${p.nom}`); equi[i].t += base*3; }
            for(let j=0; j<sobras; j++) {
                let sIdx = (pGlobal + j) % n;
                equi[sIdx].items.push(`1 ${p.nom}`); equi[sIdx].t += 3;
            }
            pGlobal = (pGlobal + sobras) % n;
        });

        let h = `<div class="mode-title">⚖️ Reparto Equitativo</div>`;
        equi.forEach((g, i) => {
            const txt = `${g.t}$ - Compra ${g.items.join(' + ')}`;
            h += `<div style="margin-top:10px; font-weight:bold;">${noms[i].toUpperCase()}:</div>
            <div class="res-box"><button class="copy-btn" style="float:right; background:#444; color:white; border:none; padding:4px; cursor:pointer;" onclick="navigator.clipboard.writeText('${txt}')">Copiar</button>
            <b>${g.t}$</b> - Compra
