<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Cosecha PRO - V40 Reparto Optimizado</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #673ab7; --success: #34a853; --danger: #ea4335; --dark: #202124; }
        body { font-family: 'Segoe UI', sans-serif; margin: 20px; background: #f8f9fa; display: flex; justify-content: center; }
        .box { width: 100%; max-width: 950px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        
        .panel { padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e0e0e0; }
        .config-panel { background: #fffdf0; border-left: 5px solid #fbc02d; }
        .setup-panel { background: #f0f7ff; border-left: 5px solid var(--primary); }
        
        .btn { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; color: white; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-ia { background: var(--secondary); }
        .btn-add { background: var(--success); }
        .btn-clear { background: var(--danger); }
        .btn-key { background: #5f6368; font-size: 11px; padding: 5px 10px; }

        #main-container { display: flex; gap: 25px; width: 100%; max-width: 1300px; }
        #gallery { display: flex; gap: 10px; flex-wrap: wrap; margin: 15px 0; padding: 10px; background: #ffffff; border-radius: 10px; border: 2px dashed #d1d1d1; min-height: 70px; }
        .thumb-item { position: relative; width: 70px; height: 70px; border: 2px solid #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s; }
        .thumb-item:hover { transform: translateY(-3px); }
        .thumb-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
        .btn-del-img { position: absolute; top: -10px; right: -10px; background: var(--danger); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: 12px; border: 2px solid white; }

        #preview-aside { width: 350px; position: sticky; top: 20px; height: fit-content; background: #000; border-radius: 15px; overflow: hidden; border: 5px solid var(--primary); display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
        #preview-aside img { width: 100%; display: block; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #f1f3f4; color: #5f6368; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #f1f1f1; }
        input { padding: 8px; border: 1px solid #ced4da; border-radius: 8px; width: 90%; transition: 0.2s; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(26,115,232,0.1); }
        
        .res-box { background: var(--dark); color: #e8eaed; padding: 18px; border-radius: 12px; margin-top: 10px; font-family: 'Consolas', monospace; position: relative; line-height: 1.5; }
        .mode-header { font-weight: 800; margin-top: 30px; padding: 12px; background: #fff; border-radius: 10px; display: flex; align-items: center; gap: 12px; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        #loading { display: none; color: var(--secondary); font-weight: bold; margin-left: 15px; }
        .copy-btn { position: absolute; top: 12px; right: 12px; background: #3c4043; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .copy-btn:hover { background: #5f6368; }
    </style>
</head>
<body>

<div id="main-container">
    <div class="box">
        <h2 style="color:var(--dark); margin:0 0 20px 0; display:flex; align-items:center; gap:10px;">
            <span style="font-size:30px;">📦</span> Calculadora Cosecha PRO V40
        </h2>

        <div class="config-panel panel">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <strong>🔑 CONFIGURACIÓN API</strong>
                <button class="btn btn-key" onclick="borrarKey()">BORRAR CLAVE GUARDADA</button>
            </div>
            <input type="password" id="api-key" style="margin-top:10px; width:95%;" placeholder="Pega aquí tu Gemini API Key..." oninput="localStorage.setItem('h_key_v40', this.value)">
        </div>

        <div class="setup-panel panel">
            <strong>👥 EQUIPO:</strong> Nº de Personas 
            <input type="number" id="n-soc" value="3" min="1" style="width:60px;" oninput="crearSocios()">
            <div id="nombres-area" style="display:flex; flex-wrap:wrap; margin-top:12px;"></div>
        </div>

        <div style="display:flex; gap:12px; align-items:center; margin-bottom:15px;">
            <button class="btn btn-add" onclick="nuevaFila('', 0)">➕ AÑADIR FILA</button>
            <label class="btn btn-ia">
                📷 ANALIZAR CAPTURA
                <input type="file" id="file-input" accept="image/*" style="display:none" onchange="subirFoto(this)">
            </label>
            <span id="loading">⌛ PROCESANDO...</span>
            <button class="btn btn-clear" style="margin-left:auto" onclick="limpiar()">🗑️ RESET</button>
        </div>

        <div id="gallery"></div>

        <table>
            <thead><tr><th>Producto</th><th>Cantidad (x)</th><th>Valor ($)</th><th></th></tr></thead>
            <tbody id="cuerpo"></tbody>
        </table>

        <div id="resultados"></div>
    </div>

    <aside id="preview-aside">
        <div style="color:white; padding:10px; font-size:12px; text-align:center; background:var(--primary); font-weight:bold;">🔍 ZOOM DE IMAGEN</div>
        <img id="preview-img" src="">
    </aside>
</div>

<script>
    let fotos = [];
    const PRODUCTOS_PREDEF = ["Remolacha azucarera", "Café", "Piña", "Trigo", "Arándanos", "Patata", "Champiñones", "Cebada", "Maíz"];

    window.onload = () => {
        const k = localStorage.getItem('h_key_v40');
        if(k) document.getElementById('api-key').value = k;
        crearSocios();
        PRODUCTOS_PREDEF.forEach(p => nuevaFila(p, 0));
    };

    function borrarKey() { if(confirm("¿Eliminar la API Key del navegador?")) { localStorage.removeItem('h_key_v40'); document.getElementById('api-key').value = ""; } }

    function nuevaFila(n, q) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" class="in-n" value="${n}" oninput="repartir()"></td>
            <td><input type="number" class="in-q" value="${q}" oninput="repartir()"></td>
            <td class="vd" style="font-weight:bold; color:var(--primary)">${q*3}$</td>
            <td><button style="background:none; border:none; cursor:pointer;" onclick="this.parentElement.parentElement.remove(); repartir();">❌</button></td>
        `;
        document.getElementById('cuerpo').appendChild(tr);
        repartir();
    }

    function crearSocios() {
        const n = document.getElementById('n-soc').value;
        const area = document.getElementById('nombres-area');
        const prevNoms = Array.from(area.querySelectorAll('input')).map(i => i.value);
        area.innerHTML = "";
        for(let i=0; i<n; i++) {
            const inp = document.createElement('input');
            inp.style.width = "120px"; inp.style.margin = "4px";
            inp.value = prevNoms[i] || `Socio ${i+1}`;
            inp.className = "soc-nom";
            inp.oninput = repartir;
            area.appendChild(inp);
        }
        repartir();
    }

    async function subirFoto(input) {
        if(!input.files[0]) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            fotos.push(e.target.result);
            renderGaleria();
            await llamarIA(e.target.result.split(',')[1]);
        };
        reader.readAsDataURL(input.files[0]);
        input.value = "";
    }

    function renderGaleria() {
        const gal = document.getElementById('gallery');
        gal.innerHTML = "";
        fotos.forEach((src, i) => {
            const d = document.createElement('div');
            d.className = "thumb-item";
            d.innerHTML = `<img src="${src}" onmouseover="showPrev('${src}')" onmouseout="hidePrev()"><button class="btn-del-img" onclick="borrarFoto(${i})">×</button>`;
            gal.appendChild(d);
        });
    }

    function showPrev(src) { document.getElementById('preview-img').src = src; document.getElementById('preview-aside').style.display = "block"; }
    function hidePrev() { document.getElementById('preview-aside').style.display = "none"; }
    function borrarFoto(i) { fotos.splice(i,1); renderGaleria(); }

    async function llamarIA(data) {
        const key = document.getElementById('api-key').value;
        if(!key) return alert("Falta API Key");
        document.getElementById('loading').style.display = "inline";
        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [
                    { text: "Extrae PRODUCTO:CANTIDAD tras la 'x'. Ignora semillas/KG. Nombres: Café, Piña, Trigo, Remolacha azucarera, Arándanos, Patata, Champiñones, Cebada, Maíz." },
                    { inline_data: { mime_type: "image/png", data: data } }
                ] }] })
            });
            const j = await r.json();
            if(j.candidates) procesarIA(j.candidates[0].content.parts[0].text);
        } catch(e) { alert("Error API"); }
        document.getElementById('loading').style.display = "none";
    }

    function procesarIA(t) {
        t.split('\n').forEach(l => {
            if(!l.includes(':')) return;
            const [nIA, qRaw] = l.split(':');
            const qIA = parseInt(qRaw.replace(/\D/g, '')) || 0;
            if(qIA <= 0) return;
            let h = false;
            document.querySelectorAll('#cuerpo tr').forEach(tr => {
                const nF = tr.querySelector('.in-n').value.toLowerCase();
                if(nF.includes(nIA.toLowerCase().trim())) {
                    tr.querySelector('.in-q').value = (parseInt(tr.querySelector('.in-q').value) || 0) + qIA;
                    h = true;
                }
            });
            if(!h) nuevaFila(nIA.trim(), qIA);
        });
        repartir();
    }

    function repartir() {
        const n = parseInt(document.getElementById('n-soc').value) || 1;
        const noms = Array.from(document.querySelectorAll('.soc-nom')).map(i => i.value);
        let items = [];
        let totalDinero = 0;
        document.querySelectorAll('#cuerpo tr').forEach(tr => {
            const q = parseInt(tr.querySelector('.in-q').value) || 0;
            const nom = tr.querySelector('.in-n').value;
            tr.querySelector('.vd').innerText = (q*3) + "$";
            if(q > 0) { items.push({nom, q, rem: q}); totalDinero += q * 3; }
        });

        const objetivoSocio = totalDinero / n;

        // --- REPARTO 1: EQUITATIVO (Matemático) ---
        let eq = Array.from({length: n}, () => ({l:[], t:0}));
        let pE = 0;
        items.forEach(it => {
            let base = Math.floor(it.q / n), sob = it.q % n;
            for(let i=0; i<n; i++) if(base > 0) { eq[i].l.push(`${base} ${it.nom}`); eq[i].t += base*3; }
            for(let j=0; j<sob; j++) { let idx = (pE + j) % n; eq[idx].l.push(`1 ${it.nom}`); eq[idx].t += 3; }
            pE = (pE + sob) % n;
        });

        // --- REPARTO 2: RÁPIDO (Híbrido por valor) ---
        let ra = Array.from({length: n}, () => ({l:[], t:0}));
        let idxSocio = 0;
        items.forEach(it => {
            let cantidadRestanteItem = it.q;
            while(cantidadRestanteItem > 0 && idxSocio < n) {
                let faltaSocio = objetivoSocio - ra[idxSocio].t;
                let unidadesNecesarias = Math.max(0, Math.floor(faltaSocio / 3));
                
                if(unidadesNecesarias <= 0 && idxSocio < n-1) { 
                    idxSocio++; 
                    continue; 
                }

                let aDar = Math.min(cantidadRestanteItem, unidadesNecesarias);
                // Si es el último socio, se queda todo el resto para cuadrar
                if(idxSocio === n - 1) aDar = cantidadRestanteItem;

                if(aDar > 0) {
                    ra[idxSocio].l.push(`${aDar} ${it.nom}`);
                    ra[idxSocio].t += aDar * 3;
                    cantidadRestanteItem -= aDar;
                } else if (idxSocio < n - 1) {
                    idxSocio++;
                } else {
                    break;
                }
            }
        });

        dibujar(eq, ra, noms);
    }

    function dibujar(eq, ra, noms) {
        let h = `<div class="mode-header">⚖️ OPCIÓN 1: REPARTO EQUITATIVO (MÁXIMA IGUALDAD)</div>`;
        eq.forEach((s, i) => h += fmt(noms[i], s));
        h += `<div class="mode-header">⚡ OPCIÓN 2: REPARTO RÁPIDO (MINIMIZAR MEZCLAS)</div>`;
        ra.forEach((s, i) => h += fmt(noms[i], s));
        document.getElementById('resultados').innerHTML = h;
    }

    function fmt(nom, s) {
        const t = `${s.t}$ - Compra ${s.l.join(' + ')}`;
        return `<div style="margin-top:12px;"><strong>${nom.toUpperCase()}</strong>
                <div class="res-box"><button class="copy-btn" onclick="navigator.clipboard.writeText('${t}')">COPIAR</button>
                <span style="color:#fbc02d; font-weight:bold;">${s.t}$</span> - Compra ${s.l.join(' + ') || 'Nada'}</div></div>`;
    }

    function limpiar() { if(confirm("¿Resetear tabla?")) { document.getElementById('cuerpo').innerHTML=""; PRODUCTOS_PREDEF.forEach(p=>nuevaFila(p,0)); } }
</script>
</body>
</html>
