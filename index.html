<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Cosecha PRO - V35 TOTAL FIX</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #673ab7; --success: #34a853; --danger: #ea4335; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background: #f4f7f6; color: #333; }
        .box { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        /* Paneles */
        .panel { padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e0e0e0; }
        .config-panel { background: #fff8e1; }
        .setup-panel { background: #e3f2fd; border-left: 6px solid var(--primary); }
        
        /* Botones */
        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; color: white; }
        .btn-ia { background: var(--secondary); }
        .btn-add { background: var(--success); }
        .btn-clear { background: var(--danger); }
        
        /* Galería de Miniaturas */
        #gallery { display: flex; gap: 15px; flex-wrap: wrap; margin: 20px 0; padding: 10px; background: #fafafa; border-radius: 12px; min-height: 50px; border: 2px dashed #ccc; }
        .thumb-item { position: relative; width: 90px; height: 90px; }
        .thumb-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 2px solid white; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
        .thumb-item:hover img { transform: scale(3); position: fixed; top: 50%; left: 50%; translate: -50% -50%; z-index: 1000; object-fit: contain; background: rgba(0,0,0,0.9); width: 400px; height: 400px; padding: 10px; }
        .btn-del-img { position: absolute; top: -5px; right: -5px; background: red; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 12px; z-index: 10; }

        /* Tabla */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 8px; width: 90%; }
        
        /* Resultados */
        .res-box { background: #202124; color: #e8eaed; padding: 18px; border-radius: 12px; margin-top: 10px; font-family: 'Courier New', monospace; position: relative; border-left: 5px solid var(--success); }
        .copy-btn { position: absolute; top: 10px; right: 10px; background: #3c4043; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 11px; }
        .copy-btn:hover { background: #5f6368; }
        
        #loading { display: none; color: var(--secondary); font-weight: bold; margin-left: 15px; }
    </style>
</head>
<body>

<div class="box">
    <h1 style="text-align:center; color: var(--primary); margin-bottom: 30px;">Cosecha Inteligente PRO V35</h1>

    <div class="config-panel panel">
        <strong>🔑 API KEY GEMINI:</strong>
        <input type="password" id="api-key" placeholder="Pega tu clave aquí..." oninput="localStorage.setItem('cosecha_key_v35', this.value)">
    </div>

    <div class="setup-panel panel">
        <strong>👥 Configuración de Socios:</strong> Nº de Personas 
        <input type="number" id="n-soc" value="3" min="1" style="width:70px;" oninput="cambiarSocios();">
        <div id="nombres-area" style="display:flex; flex-wrap:wrap; margin-top:10px;"></div>
    </div>

    <div style="display:flex; gap:12px; align-items:center;">
        <button class="btn btn-add" onclick="agregarFila('', 0)">➕ Nueva Fila</button>
        <label class="btn btn-ia">
            📷 SUBIR IMAGEN (SUMAR)
            <input type="file" id="file-input" accept="image/*" style="display:none" onchange="subirImagen(this)">
        </label>
        <span id="loading">⌛ ANALIZANDO...</span>
        <button class="btn btn-clear" style="margin-left:auto" onclick="resetTotal()">🗑️ BORRAR TODO</button>
    </div>

    <div id="gallery"></div>

    <table>
        <thead>
            <tr><th>Producto</th><th>Cantidad</th><th>Valor ($)</th><th>Acción</th></tr>
        </thead>
        <tbody id="cuerpo-tabla"></tbody>
    </table>

    <div id="resultados"></div>
</div>

<script>
    const PRODUCTOS_BASE = ["Remolacha azucarera", "Café", "Piña", "Trigo", "Arándanos", "Patata", "Champiñones", "Cebada", "Maíz"];
    let galeriaFotos = [];

    window.onload = () => {
        const guardada = localStorage.getItem('cosecha_key_v35');
        if(guardada) document.getElementById('api-key').value = guardada;
        cambiarSocios();
        iniciarTabla();
    };

    // --- GESTIÓN DE TABLA Y SOCIOS ---
    function iniciarTabla() {
        const cuerpo = document.getElementById('cuerpo-tabla');
        cuerpo.innerHTML = "";
        PRODUCTOS_BASE.forEach(p => agregarFila(p, 0));
    }

    function agregarFila(nombre = "", cantidad = 0) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" class="p-nom" value="${nombre}" oninput="procesarReparto()"></td>
            <td><input type="number" class="p-cant" value="${cantidad}" oninput="procesarReparto()"></td>
            <td class="p-val" style="font-weight:bold; color:var(--primary)">${cantidad * 3}$</td>
            <td><button onclick="this.parentElement.parentElement.remove(); procesarReparto();">❌</button></td>
        `;
        document.getElementById('cuerpo-tabla').appendChild(tr);
        procesarReparto();
    }

    function cambiarSocios() {
        const n = parseInt(document.getElementById('n-soc').value) || 1;
        const area = document.getElementById('nombres-area');
        area.innerHTML = "";
        for(let i=0; i<n; i++) {
            const input = document.createElement('input');
            input.style.width = "130px"; input.style.margin = "5px";
            input.value = `Socio ${i+1}`;
            input.className = "nombre-socio";
            input.oninput = procesarReparto;
            area.appendChild(input);
        }
        procesarReparto();
    }

    // --- PROCESAMIENTO DE IMAGEN ---
    async function subirImagen(input) {
        if(!input.files[0]) return;
        const file = input.files[0];
        const reader = new FileReader();
        
        reader.onload = async (e) => {
            const b64Full = e.target.result;
            // Añadir a galería visual
            galeriaFotos.push(b64Full);
            dibujarGaleria();
            
            // Enviar a IA
            await llamarIA(b64Full.split(',')[1]);
        };
        reader.readAsDataURL(file);
        input.value = ""; // Reset input
    }

    function dibujarGaleria() {
        const gal = document.getElementById('gallery');
        gal.innerHTML = "";
        galeriaFotos.forEach((src, index) => {
            const div = document.createElement('div');
            div.className = "thumb-item";
            div.innerHTML = `
                <img src="${src}">
                <button class="btn-del-img" onclick="borrarFoto(${index})">x</button>
            `;
            gal.appendChild(div);
        });
    }

    function borrarFoto(idx) {
        galeriaFotos.splice(idx, 1);
        dibujarGaleria();
    }

    async function llamarIA(b64Data) {
        const key = document.getElementById('api-key').value;
        if(!key) return alert("Falta la API KEY");
        document.getElementById('loading').style.display = "inline";

        const prompt = "Analiza la imagen. Busca productos y cantidades (el número tras la 'x'). Ignora KG. Formato estricto: PRODUCTO:CANTIDAD. Ejemplo: Trigo:1500. No escribas nada más.";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/png", data: b64Data } }] }]
                })
            });
            const data = await response.json();
            const textoIA = data.candidates[0].content.parts[0].text;
            procesarDatosIA(textoIA);
        } catch (err) {
            alert("Error con la IA. Revisa tu API Key.");
        }
        document.getElementById('loading').style.display = "none";
    }

    function procesarDatosIA(texto) {
        const lineas = texto.split('\n');
        lineas.forEach(linea => {
            if(!linea.includes(':')) return;
            const partes = linea.split(':');
            const nombreIA = partes[0].trim().toLowerCase();
            const cantidadIA = parseInt(partes[1].replace(/\D/g, '')) || 0;

            if(cantidadIA <= 0) return;

            let encontrado = false;
            let filas = document.querySelectorAll('#cuerpo-tabla tr');

            filas.forEach(tr => {
                const nombreFila = tr.querySelector('.p-nom').value.toLowerCase();
                // Similitud básica: si se parecen un 75% o más
                if(calcularSimilitud(nombreIA, nombreFila) > 0.75) {
                    const inputCant = tr.querySelector('.p-cant');
                    inputCant.value = (parseInt(inputCant.value) || 0) + cantidadIA;
                    encontrado = true;
                }
            });

            if(!encontrado && nombreIA.length > 2) {
                agregarFila(partes[0].trim(), cantidadIA);
            }
        });
        procesarReparto();
    }

    // --- LÓGICA MATEMÁTICA Y REPARTO ---
    function procesarReparto() {
        const n = parseInt(document.getElementById('n-soc').value) || 1;
        const nombres = Array.from(document.querySelectorAll('.nombre-socio')).map(i => i.value);
        let productosValidos = [];
        
        document.querySelectorAll('#cuerpo-tabla tr').forEach(tr => {
            const nom = tr.querySelector('.p-nom').value;
            const cant = parseInt(tr.querySelector('.p-cant').value) || 0;
            tr.querySelector('.p-val').innerText = (cant * 3) + "$";
            if(cant > 0) productosValidos.push({ nom, cant });
        });

        // Carrusel Global de Sobras
        let reparto = Array.from({length: n}, () => ({ lista: [], total: 0 }));
        let punteroSobra = 0;

        productosValidos.forEach(p => {
            let base = Math.floor(p.cant / n);
            let sobrantes = p.cant % n;

            for(let i=0; i<n; i++) {
                if(base > 0) {
                    reparto[i].lista.push(`${base} ${p.nom}`);
                    reparto[i].total += base * 3;
                }
            }

            for(let j=0; j<sobrantes; j++) {
                let idSocio = (punteroSobra + j) % n;
                // Buscar si ya tiene el item para sumar el extra
                let idxExistente = reparto[idSocio].lista.findIndex(item => item.endsWith(p.nom));
                if(idxExistente !== -1) {
                    let cantActual = parseInt(reparto[idSocio].lista[idxExistente]);
                    reparto[idSocio].lista[idxExistente] = `${cantActual + 1} ${p.nom}`;
                } else {
                    reparto[idSocio].lista.push(`1 ${p.nom}`);
                }
                reparto[idSocio].total += 3;
            }
            punteroSobra = (punteroSobra + sobrantes) % n;
        });

        dibujarResultados(reparto, nombres);
    }

    function dibujarResultados(reparto, nombres) {
        let html = `<h2 style="margin-top:40px;">⚖️ Reparto Equitativo Final</h2>`;
        reparto.forEach((soc, i) => {
            const textoCopiar = `${soc.total}$ - Compra ${soc.lista.join(' + ')}`;
            html += `
                <div style="margin-bottom:15px;">
                    <strong>${nombres[i].toUpperCase()}</strong>
                    <div class="res-box">
                        <button class="copy-btn" onclick="navigator.clipboard.writeText('${textoCopiar}')">COPIAR</button>
                        <b>${soc.total}$</b> - Compra ${soc.lista.join(' + ') || 'Nada'}
                    </div>
                </div>
            `;
        });
        document.getElementById('resultados').innerHTML = html;
    }

    // --- UTILIDADES ---
    function calcularSimilitud(s1, s2) {
        let longer = s1.length < s2.length ? s2 : s1;
        let shorter = s1.length < s2.length ? s1 : s2;
        if (longer.length === 0) return 1.0;
        return (longer.length - editDistance(longer, shorter)) / parseFloat(longer.length);
    }

    function editDistance(s1, s2) {
        let costs = [];
        for (let i = 0; i <= s1.length; i++) {
            let lastValue = i;
            for (let j = 0; j <= s2.length; j++) {
                if (i == 0) costs[j] = j;
                else if (j > 0) {
                    let newValue = costs[j - 1];
                    if (s1.charAt(i - 1) != s2.charAt(j - 1)) newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                    costs[j - 1] = lastValue; lastValue = newValue;
                }
            }
            if (i > 0) costs[s2.length] = lastValue;
        }
        return costs[s2.length];
    }

    function resetTotal() {
        if(confirm("¿Seguro que quieres borrar todo?")) {
            galeriaFotos = [];
            dibujarGaleria();
            iniciarTabla();
        }
    }

    function toBase64(f) { return new Promise((res) => { const r = new FileReader(); r.readAsDataURL(f); r.onload = () => res(r.result); }); }
</script>
</body>
</html>
